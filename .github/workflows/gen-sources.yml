name: Generate Minecraft Sources

on:
  workflow_dispatch:  # 手动触发

jobs:
  gen-sources:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 运行 genSources（生成反编译源码）
        run: ./gradlew genSources --no-daemon

      - name: 打包生成的源码和缓存（供下载）
        run: |
          mkdir -p output
          # 复制 build 目录（包含反编译后的源码）
          cp -r build output/
          # 复制 gradle 缓存中的 fabric-loom 相关文件（可选，但有助于加速本地识别）
          cp -r ~/.gradle/caches/fabric-loom output/fabric-loom-cache 2>/dev/null || true
          # 压缩成 zip
          cd output && zip -r ../gen-sources-output.zip . && cd ..

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gen-sources-output
          path: gen-sources-output.zip