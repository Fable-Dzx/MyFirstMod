name: Generate Minecraft Sources

on:
  workflow_dispatch:

jobs:
  gen-sources:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 21  # 改这里
        uses: actions/setup-java@v4
        with:
          java-version: '21'  # 17 → 21
          distribution: 'temurin'

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 运行 genSources
        run: ./gradlew genSources --no-daemon

      - name: 打包生成的文件
        run: |
          mkdir -p output
          cp -r build output/
          cp -r ~/.gradle/caches/fabric-loom output/fabric-loom-cache 2>/dev/null || true
          cd output && zip -r ../gen-sources-output.zip . && cd ..

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gen-sources-output
          path: gen-sources-output.zip